services:
  db:
    image: mysql:8.4
    environment:
      TZ: "Asia/Tokyo"
    env_file:
      - .env.database
    tmpfs:
      - /var/lib/mysql
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 20s
      retries: 3
      start_period: 5s

  db-prep:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace/packages/server
    env_file:
      - .env.database
    command: >
      sh -c "pnpm drizzle-kit push
      --dialect mysql --schema=./src/db/schema.ts
      --host=$$DB_HOST --user=$$MYSQL_USER
      --password=$$MYSQL_PASSWORD --database=$$MYSQL_DATABASE"
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.database
    environment:
      TZ: "Asia/Tokyo"
    command: pnpm --filter server dev
    depends_on:
      db-prep:
        condition: service_completed_successfully
    expose:
      - "4000"
    develop:
      watch:
        - action: sync
          path: ./packages/server
          target: /workspace/packages/server
          ignore:
            - node_modules/
        - action: rebuild
          path: pnpm-lock.yaml

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    environment:
      TZ: "Asia/Tokyo"
      API_URL: "http://server:4000"
    command: pnpm --filter web dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ./packages/web
          target: /workspace/packages/web
          ignore:
            - node_modules/
        - action: rebuild
          path: pnpm-lock.yaml
