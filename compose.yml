services:
  db:
    image: mysql:8.4
    environment:
      TZ: "Asia/Tokyo"
    env_file:
      - .env.database
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 20s
      retries: 3
      start_period: 5s

  # db-prep: one-shot マイグレーション＋シード（廃止 → pnpm db:migrate / db:seed に移行）
  # db-prep:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   working_dir: /workspace/packages/server
  #   env_file:
  #     - .env.database
  #   command: >
  #     sh -c "pnpm drizzle-kit push --force
  #     --dialect mysql --schema=./src/db/schema.ts
  #     --host=$$DB_HOST --user=$$MYSQL_USER
  #     --password=$$MYSQL_PASSWORD --database=$$MYSQL_DATABASE
  #     && pnpm tsx src/db/seed.ts /workspace/sample.kif"
  #   depends_on:
  #     db:
  #       condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.database
      - .env.server
    environment:
      TZ: "Asia/Tokyo"
    command: pnpm --filter server start
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    ports:
      - "4000:4000"
    develop:
      watch:
        - action: sync+restart
          path: ./packages/server
          target: /workspace/packages/server
          ignore:
            - node_modules/
        - action: rebuild
          path: pnpm-lock.yaml

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    working_dir: /workspace
    env_file:
      - .env.worker
    environment:
      TZ: "Asia/Tokyo"
    cpus: 1
    command: pnpm --filter worker start
    depends_on:
      server:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./packages/worker
          target: /workspace/packages/worker
          ignore:
            - node_modules/
            - Dockerfile
            - Dockerfile.engine
        - action: rebuild
          path: pnpm-lock.yaml

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.web
    environment:
      TZ: "Asia/Tokyo"
    command: pnpm --filter web dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ./packages/web
          target: /workspace/packages/web
          ignore:
            - node_modules/
        - action: rebuild
          path: pnpm-lock.yaml

volumes:
  db-data:
