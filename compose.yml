services:
  db:
    image: mysql:8.4
    environment:
      TZ: 'Asia/Tokyo'
    env_file:
      - .env.database
    volumes:
      - db-data:/var/lib/mysql
    # host には公開しない（compose 網内からのみ到達）。ホスト実行の db ツール
    # （pnpm db:push / db:seed / *:dev）は scripts/db-forward.sh が都度 port-forward する。
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 20s
      retries: 3
      start_period: 5s

  # db-prep: one-shot マイグレーション＋シード（廃止 → pnpm db:migrate / db:seed に移行）
  # db-prep:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   working_dir: /workspace/packages/server
  #   env_file:
  #     - .env.database
  #   command: >
  #     sh -c "pnpm drizzle-kit push --force
  #     --dialect mysql --schema=./src/db/schema.ts
  #     --host=$$DB_HOST --user=$$MYSQL_USER
  #     --password=$$MYSQL_PASSWORD --database=$$MYSQL_DATABASE
  #     && pnpm tsx src/db/seed.ts /workspace/sample.kif"
  #   depends_on:
  #     db:
  #       condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.database
      - .env.server
    environment:
      TZ: 'Asia/Tokyo'
      # https 配信時（リモート = Cloudflare が終端）は secure cookie を強制。
      # ローカルは既定 false。remote は .env.remote で COOKIE_SECURE=true を渡す。
      COOKIE_SECURE: '${COOKIE_SECURE:-false}'
    command: pnpm --filter server start
    depends_on:
      db:
        condition: service_healthy
    # host には公開しない。ブラウザは web(Vite) の /api proxy 経由で server に届き
    # （DEV_API_TARGET=http://server:4000）、compose 内 worker も compose 網内で
    # server:4000 に繋ぐ。Docker 外 worker を使う場合は SERVER_URL を web の /api proxy
    # （http://localhost:5173）へ向ける（prd/02 §6）。
    expose:
      - '4000'
    develop:
      watch:
        - action: sync+restart
          path: ./packages/server
          target: /workspace/packages/server
          ignore:
            - node_modules/
            - dist/
            - '*.tsbuildinfo'
            - '*.log'
        - action: rebuild
          path: pnpm-lock.yaml

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    working_dir: /workspace
    env_file:
      - .env.worker
    environment:
      TZ: 'Asia/Tokyo'
      # 接続先は compose 内 server に固定（web の DEV_API_TARGET と同じ流儀）。
      # .env.worker が本番向きでも dev/remote compose の worker は本番を叩かない保険。
      SERVER_URL: 'http://server:4000'
    cpus: 1
    command: pnpm --filter worker start
    depends_on:
      server:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: ./packages/worker
          target: /workspace/packages/worker
          ignore:
            - node_modules/
            - dist/
            - '*.tsbuildinfo'
            - '*.log'
            - Dockerfile
            - Dockerfile.engine
        - action: rebuild
          path: pnpm-lock.yaml

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.web
    environment:
      TZ: 'Asia/Tokyo'
      # 同一オリジン配信: ブラウザは /api を叩き、Vite が compose 内の server へ素通しで転送。
      # server は basePath('/api') なのでパスは書き換えない。.env.web の VITE_API_URL は不要。
      DEV_API_TARGET: 'http://server:4000'
      # リモート公開時のみ設定（vite.config.ts が allowedHosts / HMR wss:443 を条件付与）。
      # ローカルは localhost（＝リモート差分なし）。
      DEV_ALLOWED_HOST: '${DEV_ALLOWED_HOST:-localhost}'
    command: pnpm --filter web dev --host
    # ローカルは 5173 を公開。リモートは .env.remote の WEB_BIND=127.0.0.1:<port> で
    # cloudflared 向けに 127.0.0.1 の1ポートだけ公開する。
    ports:
      - '${WEB_BIND:-5173}:5173'
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ./packages/web
          target: /workspace/packages/web
          ignore:
            - node_modules/
            - dist/
            - '*.tsbuildinfo'
            - '*.log'
        - action: rebuild
          path: pnpm-lock.yaml

volumes:
  db-data:
